server:
  port: 8082

spring:
  application:
    name: customer-service
  mail:
    host: ${SMTP_HOST}
    port: ${SMTP_PORT}
    username: ${SMTP_USER}
    password: ${SMTP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  datasource:
    url: ${DB_URL}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fintrust.customer: DEBUG

feign:
  client:
    auth-service:
      url: ${AUTH_SERVICE_URL}
    atm-service:
      url: ${ATM_SERVICE_URL}

# Mail settings
app:
  mail:
    enabled: true
    from-name: FinTrust Bank

# Cloudinary
cloudinary:
  cloud-name: ${CLOUDINARY_NAME}
  api-key: ${CLOUDINARY_KEY}
  api-secret: ${CLOUDINARY_SECRET}
  folder: ${CLOUDINARY_FOLDER}
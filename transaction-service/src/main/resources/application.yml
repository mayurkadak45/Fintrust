server:
  port: 8083

spring:
  application:
    name: transaction-service
  datasource:
    url: ${DB_URL}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

jwt:
  secret: ${JWT_SECRET}

feign:
  client:
    account-service:
      url: ${ACCOUNT_SERVICE_URL}
    customer-service:
      url: ${CUSTOMER_SERVICE_URL}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.fintrust.transaction: DEBUG